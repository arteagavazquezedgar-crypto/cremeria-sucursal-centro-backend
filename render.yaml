services:
  - type: web
    runtime: node
    name: cremeria-admin-remoto
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: /var/data/cremeria
      - key: ADMIN_NAME
        value: Cremería El Güero - Sucursal Centro
      - key: NODE_VERSION
        value: "22"
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
